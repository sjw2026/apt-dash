<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강북구 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse (CSV 파싱) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Chart.js (차트 생성) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #f8fafc; }
        /* 로딩 스피너 애니메이션 */
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 테이블 스크롤바 꾸미기 */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- 헤더 -->
        <header class="bg-white shadow-sm rounded-xl p-6 border border-gray-100 flex justify-between items-center">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-900">강북구 아파트 실거래가 대시보드</h1>
                <div class="flex items-center gap-2 mt-2">
                    <p class="text-sm text-gray-500">구글 시트 실시간 데이터 연동</p>
                    <span class="text-xs px-2 py-1 bg-gray-100 text-gray-600 rounded-full" id="updateTime">데이터 로딩중...</span>
                </div>
            </div>
            <div id="loading" class="flex items-center text-blue-500 font-medium">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6 mr-3"></div>
                데이터 불러오는 중...
            </div>
        </header>

        <!-- 필터 영역 (법정동, 아파트명) -->
        <div class="bg-white shadow-sm rounded-xl p-6 border border-gray-100 flex flex-col md:flex-row gap-4 items-center" id="filterSection" style="display: none;">
            <div class="w-full md:w-1/2">
                <label for="dongFilter" class="block text-sm font-semibold text-gray-700 mb-2">법정동 선택</label>
                <select id="dongFilter" class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="all">전체 법정동</option>
                </select>
            </div>
            <div class="w-full md:w-1/2">
                <label for="aptFilter" class="block text-sm font-semibold text-gray-700 mb-2">아파트명 선택</label>
                <select id="aptFilter" class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="all">전체 아파트</option>
                </select>
            </div>
        </div>

        <!-- 요약 카드 (전체 건수, 평균, 최고, 최저) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="summaryCards" style="display: none;">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-500">전체 거래 건수</h3>
                <p class="text-2xl font-bold text-gray-900 mt-2" id="totalCount">0건</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-500">평균 거래가격</h3>
                <p class="text-2xl font-bold text-blue-600 mt-2" id="avgPrice">0만원</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-500">최고 거래가격</h3>
                <p class="text-2xl font-bold text-red-500 mt-2" id="maxPrice">0만원</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-500">최저 거래가격</h3>
                <p class="text-2xl font-bold text-green-500 mt-2" id="minPrice">0만원</p>
            </div>
        </div>

        <!-- 차트 영역 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hidden" id="chartSection">
            <h2 class="text-lg font-bold text-gray-800 mb-4">월별 평균 거래가격 추이 (전용면적별)</h2>
            <div class="relative h-72 md:h-96 w-full">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <!-- 거래 목록 테이블 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hidden" id="tableSection">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-800">최근 거래 목록</h2>
                <span class="text-xs text-gray-400">가장 최근 거래부터 표시됩니다.</span>
            </div>
            <div class="overflow-x-auto overflow-y-auto max-h-[500px] custom-scrollbar">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead class="bg-gray-50 sticky top-0 shadow-sm">
                        <tr>
                            <th class="py-3 px-4 text-sm font-semibold text-gray-600">거래일자</th>
                            <th class="py-3 px-4 text-sm font-semibold text-gray-600">아파트명</th>
                            <th class="py-3 px-4 text-sm font-semibold text-gray-600">법정동</th>
                            <th class="py-3 px-4 text-sm font-semibold text-gray-600">전용면적(㎡)</th>
                            <th class="py-3 px-4 text-sm font-semibold text-gray-600">층</th>
                            <th class="py-3 px-4 text-sm font-semibold text-gray-600 text-right">거래금액(만원)</th>
                            <th class="py-3 px-4 text-sm font-semibold text-gray-600">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100 text-sm">
                        <!-- 데이터가 자바스크립트를 통해 이곳에 들어옵니다 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 에러 메시지 표시 영역 -->
        <div id="errorMessage" class="bg-red-50 text-red-600 p-4 rounded-xl hidden border border-red-200">
        </div>

    </div>

    <script>
        // 1. 구글 시트 CSV URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRQhZdGsAr4ziSX7xji_x7K-_S0Hl1lZaCuZM0ztvb4szxMOE_s6tjiA6-dXOtocxcQIJMIhshVRbGH/pub?output=csv';

        // 2. 숫자에 콤마 찍어주는 함수
        const formatNum = (num) => new Intl.NumberFormat('ko-KR').format(num);

        // 3. 텍스트로 된 금액("120,000")을 실제 숫자로 변환하는 함수
        const parsePrice = (priceStr) => {
            if(!priceStr) return 0;
            return parseInt(String(priceStr).replace(/,/g, ''), 10) || 0;
        };

        // 4. 날짜 문자열("20240105" 또는 "2024-01-05")에서 'YYYY-MM' 추출
        const extractMonth = (dateStr) => {
            if (!dateStr) return '알수없음';
            const cleanStr = String(dateStr).replace(/\D/g, ''); // 숫자만 남기기
            if (cleanStr.length >= 6) {
                return cleanStr.substring(0, 4) + '-' + cleanStr.substring(4, 6);
            }
            return '알수없음';
        };

        // 5. 전용면적 그룹화 함수
        const getAreaGroup = (areaStr) => {
            const area = parseFloat(areaStr);
            if (isNaN(area)) return '기타';
            if (area <= 60) return '소형(60㎡ 이하)';
            if (area <= 85) return '중형(60~85㎡)';
            return '대형(85㎡ 초과)';
        };

        // 전역 변수 (데이터 필터링 및 차트 초기화 용도)
        let globalData = [];
        let priceChartInstance = null;

        // 메인 실행 함수
        async function initDashboard() {
            try {
                // PapaParse를 이용해 CSV 파일 가져오기 및 파싱
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true, // 첫 줄을 키값으로 사용
                    skipEmptyLines: true,
                    transformHeader: function(header) {
                        // 열 이름 앞뒤의 공백 및 줄바꿈 자동 제거
                        return header.trim();
                    },
                    complete: function(results) {
                        const data = results.data;
                        
                        // 디버깅용: F12 개발자 도구의 콘솔 창에서 원본 데이터 확인 가능
                        console.log("불러온 원본 데이터 예시:", data[0]);

                        if(data.length === 0) {
                            showError("시트가 비어있습니다. 구글 시트가 '웹에 게시' 상태인지 확인해주세요.");
                            return;
                        }
                        
                        // 구글 로그인 페이지 HTML을 잘못 불러온 경우 방지 (웹에 게시 안 됨)
                        if(data[0] && data[0]['<!DOCTYPE html>'] !== undefined) {
                            showError("구글 시트가 '웹에 게시'되지 않았습니다. [파일] -> [공유] -> [웹에 게시]를 진행해주세요.");
                            return;
                        }

                        // 데이터 설정 함수 호출
                        setupData(data);
                    },
                    error: function(err) {
                        showError("데이터를 불러오는데 실패했습니다: " + err.message);
                    }
                });
            } catch (error) {
                showError("알 수 없는 오류가 발생했습니다.");
            }
        }

        // 6. 전체 데이터 설정 및 필터 구성
        function setupData(rawData) {
            // 유효한 데이터만 필터링 및 전역 변수에 저장
            globalData = rawData.filter(row => row['거래금액(만원)'] && row['거래일자']);

            if (globalData.length === 0) {
                showError('데이터는 연결되었으나 유효한 거래 내역이 없습니다.\n구글 시트의 1번째 줄(열 이름)이 "거래일자", "거래금액(만원)"과 일치하는지 확인해주세요.');
                return;
            }

            // 전체 데이터를 최신순으로 한 번만 정렬
            globalData.sort((a, b) => {
                const dateA = String(a['거래일자']).replace(/\D/g, '');
                const dateB = String(b['거래일자']).replace(/\D/g, '');
                return dateB.localeCompare(dateA);
            });

            initFilters();
            applyFilter(); // 첫 화면 렌더링

            // 로드 완료 시간 화면에 표시
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')} 기준`;
            const updateTimeEl = document.getElementById('updateTime');
            if (updateTimeEl) {
                updateTimeEl.innerText = timeString;
                updateTimeEl.classList.remove('bg-gray-100', 'text-gray-600');
                updateTimeEl.classList.add('bg-green-100', 'text-green-700');
            }
        }

        // 7. 필터 드롭다운 초기화
        function initFilters() {
            const dongSelect = document.getElementById('dongFilter');
            const aptSelect = document.getElementById('aptFilter');
            
            // 유니크한 법정동 목록 추출 및 정렬
            const dongs = [...new Set(globalData.map(d => d['법정동']).filter(Boolean))].sort();
            
            dongs.forEach(dong => {
                const opt = document.createElement('option');
                opt.value = dong;
                opt.innerText = dong;
                dongSelect.appendChild(opt);
            });

            // 법정동 변경 이벤트: 아파트 목록 업데이트 후 데이터 렌더링
            dongSelect.addEventListener('change', () => {
                updateAptFilter();
                applyFilter();
            });

            // 아파트 변경 이벤트: 데이터 렌더링
            aptSelect.addEventListener('change', () => {
                applyFilter();
            });

            // 필터 영역 노출
            document.getElementById('filterSection').style.display = 'flex';
            
            // 초기 아파트 목록 세팅
            updateAptFilter();
        }

        // 종속형 아파트 필터 업데이트 (선택된 법정동에 따라)
        function updateAptFilter() {
            const selectedDong = document.getElementById('dongFilter').value;
            const aptSelect = document.getElementById('aptFilter');
            
            aptSelect.innerHTML = '<option value="all">전체 아파트</option>';

            let apts = [];
            if (selectedDong === 'all') {
                apts = [...new Set(globalData.map(d => d['아파트명']).filter(Boolean))];
            } else {
                apts = [...new Set(globalData.filter(d => d['법정동'] === selectedDong).map(d => d['아파트명']).filter(Boolean))];
            }

            apts.sort().forEach(apt => {
                const opt = document.createElement('option');
                opt.value = apt;
                opt.innerText = apt;
                aptSelect.appendChild(opt);
            });
        }

        // 8. 필터 값에 따라 데이터를 걸러내고 대시보드 업데이트
        function applyFilter() {
            const selectedDong = document.getElementById('dongFilter').value;
            const selectedApt = document.getElementById('aptFilter').value;

            let filteredData = globalData;
            
            if (selectedDong !== 'all') {
                filteredData = filteredData.filter(d => d['법정동'] === selectedDong);
            }
            if (selectedApt !== 'all') {
                filteredData = filteredData.filter(d => d['아파트명'] === selectedApt);
            }

            renderDashboard(filteredData);
        }

        // 9. 대시보드 화면 렌더링 (요약카드, 테이블, 차트)
        function renderDashboard(validData) {
            let totalTx = validData.length;
            let sumPrice = 0;
            let maxPrice = 0;
            let minPrice = Infinity;

            const chartDataObj = {};
            let tableHTML = '';

            validData.forEach((row, index) => {
                const price = parsePrice(row['거래금액(만원)']);
                const month = extractMonth(row['거래일자']);
                const areaGroup = getAreaGroup(row['전용면적(㎡)']);

                // 요약 계산
                sumPrice += price;
                if (price > maxPrice) maxPrice = price;
                if (price < minPrice) minPrice = price;

                // 차트 데이터 수집
                if (month !== '알수없음') {
                    if (!chartDataObj[month]) chartDataObj[month] = { '소형(60㎡ 이하)': [], '중형(60~85㎡)': [], '대형(85㎡ 초과)': [] };
                    if (chartDataObj[month][areaGroup]) {
                        chartDataObj[month][areaGroup].push(price);
                    }
                }

                // 테이블 HTML 생성 (브라우저 부하 방지용 최대 200건 표기)
                if(index < 200) {
                    tableHTML += `
                        <tr class="hover:bg-blue-50 transition-colors">
                            <td class="py-2 px-4">${row['거래일자'] || '-'}</td>
                            <td class="py-2 px-4 font-medium">${row['아파트명'] || '-'}</td>
                            <td class="py-2 px-4">${row['법정동'] || '-'}</td>
                            <td class="py-2 px-4">${row['전용면적(㎡)'] || '-'}</td>
                            <td class="py-2 px-4">${row['층'] || '-'}</td>
                            <td class="py-2 px-4 text-right font-semibold text-gray-900">${formatNum(price)}</td>
                            <td class="py-2 px-4">${row['건축년도'] || '-'}</td>
                        </tr>
                    `;
                }
            });

            if (minPrice === Infinity) minPrice = 0;
            const avgPrice = totalTx > 0 ? Math.round(sumPrice / totalTx) : 0;

            // HTML에 계산된 값 삽입
            document.getElementById('totalCount').innerText = formatNum(totalTx) + "건";
            document.getElementById('avgPrice').innerText = formatNum(avgPrice) + "만원";
            document.getElementById('maxPrice').innerText = formatNum(maxPrice) + "만원";
            document.getElementById('minPrice').innerText = formatNum(minPrice) + "만원";

            if (totalTx === 0) {
                tableHTML = '<tr><td colspan="7" class="py-6 text-center text-gray-500">선택한 조건에 맞는 거래 데이터가 없습니다.</td></tr>';
            }
            document.getElementById('tableBody').innerHTML = tableHTML;

            // 요소 보이게 처리
            document.getElementById('loading').style.display = 'none';
            document.getElementById('summaryCards').style.display = 'grid';
            document.getElementById('chartSection').style.display = 'block';
            document.getElementById('tableSection').style.display = 'block';

            // 차트 재생성
            drawChart(chartDataObj);
        }

        // 10. 차트 그리기
        function drawChart(chartDataObj) {
            // 필터를 바꿀 때마다 기존 차트가 겹쳐서 깜빡이는 현상(버그)을 막기 위해 파괴 후 재생성
            if (priceChartInstance) {
                priceChartInstance.destroy();
            }

            const months = Object.keys(chartDataObj).sort();
            const areaTypes = ['소형(60㎡ 이하)', '중형(60~85㎡)', '대형(85㎡ 초과)'];
            const colors = {
                '소형(60㎡ 이하)': 'rgb(59, 130, 246)',
                '중형(60~85㎡)': 'rgb(16, 185, 129)',
                '대형(85㎡ 초과)': 'rgb(249, 115, 22)'
            };

            const datasets = areaTypes.map(type => {
                const data = months.map(month => {
                    const prices = chartDataObj[month][type];
                    if (!prices || prices.length === 0) return null;
                    const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
                    return Math.round(avg);
                });

                return {
                    label: type,
                    data: data,
                    borderColor: colors[type],
                    backgroundColor: colors[type],
                    tension: 0.3,
                    spanGaps: true,
                    pointRadius: 4,
                    borderWidth: 2
                };
            });

            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += formatNum(context.parsed.y) + '만원';
                                    }
                                    return label;
                                }
                            }
                        },
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: {
                            ticks: {
                                callback: function(value) { return formatNum(value) + '만'; }
                            }
                        }
                    }
                }
            });
        }

        // 에러 표시 함수
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const errDiv = document.getElementById('errorMessage');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
        }

        // 페이지 로드 시 대시보드 초기화 시작
        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
